<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light">
<title>Painel de Vendas — TV</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#f2f2f7; --card:#fff; --ink:#1c1c1e; --ink2:#6e6e73; --ink3:#aeaeb2;
  --track:#e5e5ea; --roxo:#7d3cc9; --verde:#34c759; --ambar:#ff9f0a; --verm:#ff3b30;
  --raio:1.1vw; --sombra:0 .12vw .7vw rgba(0,0,0,.05);
}
*{margin:0;padding:0;box-sizing:border-box}
html{color-scheme:light only}
body{
  background:var(--bg); color:var(--ink); height:100vh; width:100vw; overflow:hidden; cursor:none;
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  -webkit-font-smoothing:antialiased; display:flex; flex-direction:column;
}
.tabular{font-variant-numeric:tabular-nums}
.ok{color:var(--verde)} .quase{color:var(--ambar)} .ruim{color:var(--verm)} .neutro{color:var(--ink3)}
.bg-ok{background:var(--verde)} .bg-quase{background:var(--ambar)} .bg-ruim{background:var(--verm)} .bg-neutro{background:var(--ink3)}

/* ===== Header ===== */
header{height:6vh; display:flex; align-items:center; justify-content:space-between; padding:0 1.8vw; flex-shrink:0}
.tit{display:flex; align-items:baseline; gap:.9vw}
.tit .ind{font-size:1.7vw; font-weight:700; letter-spacing:-.02em}
.tit .mes{font-size:1vw; font-weight:600; color:var(--roxo); text-transform:uppercase; letter-spacing:.1em}
.tit .ponto{width:.5vw; height:.5vw; border-radius:50%; background:var(--ink3)}
.dir{display:flex; align-items:center; gap:1.4vw}
.dias{font-size:1vw; color:var(--ink2)} .dias b{color:var(--ink); font-weight:600}
.relogio{font-size:1.3vw; font-weight:300; color:var(--ink2)} .relogio b{font-weight:600; color:var(--ink)}

/* ===== Palco ===== */
#palco{position:relative; flex:1; min-height:0}
.tela{position:absolute; inset:0; padding:0 1.8vw .8vh; opacity:0; pointer-events:none; transition:opacity .7s ease;
  display:grid; grid-template-columns:26.5% 1fr; grid-template-rows:1fr 15vh; gap:1vw; min-height:0}
.tela.ativa{opacity:1; pointer-events:auto}

/* ===== Hero (Total) ===== */
.hero{grid-row:1; grid-column:1; background:var(--card); border-radius:var(--raio); box-shadow:var(--sombra);
  padding:1.6vh 1.3vw; display:flex; flex-direction:column}
.hero .eyebrow{font-size:.85vw; font-weight:700; color:var(--ink3); text-transform:uppercase; letter-spacing:.14em}
.ring-wrap{flex:1; display:flex; align-items:center; justify-content:center; position:relative; margin:.6vh 0}
.ring{position:relative; width:15vw; height:15vw}
.ring svg{width:100%; height:100%; transform:rotate(-90deg)}
.ring-center{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center}
.ring-center .big{font-size:4.4vw; font-weight:250; letter-spacing:-.04em; line-height:1}
.ring-center .big small{font-size:1.6vw; font-weight:300; color:var(--ink3)}
.ring-center .cap{font-size:.85vw; font-weight:600; color:var(--ink3); text-transform:uppercase; letter-spacing:.1em; margin-top:.3vh}
.hero-mtd{text-align:center; margin-bottom:1vh}
.hero-mtd .v{font-size:2vw; font-weight:500; letter-spacing:-.02em}
.hero-mtd .k{font-size:.8vw; color:var(--ink3); text-transform:uppercase; letter-spacing:.08em}
.hero-grid{display:grid; grid-template-columns:1fr 1fr; gap:.7vw}
.mini-met{background:var(--bg); border-radius:.7vw; padding:.9vh .8vw}
.mini-met .k{font-size:.75vw; font-weight:600; color:var(--ink3); text-transform:uppercase; letter-spacing:.06em}
.mini-met .v{font-size:1.45vw; font-weight:500; letter-spacing:-.02em; margin-top:.2vh}
.proj-banner{margin-top:.7vw; border-radius:.7vw; padding:1vh .9vw; display:flex; align-items:center; justify-content:space-between;
  background:var(--bg)}
.proj-banner .l{display:flex; flex-direction:column}
.proj-banner .k{font-size:.75vw; font-weight:600; color:var(--ink3); text-transform:uppercase; letter-spacing:.06em}
.proj-banner .v{font-size:1.45vw; font-weight:600; letter-spacing:-.02em}
.proj-banner .pct{font-size:1.9vw; font-weight:300; display:flex; align-items:center; gap:.5vw}
.farol-dot{width:.9vw; height:.9vw; border-radius:50%}

/* ===== Coluna direita ===== */
.right{grid-row:1; grid-column:2; display:grid; grid-template-rows:1fr 1fr 1.75fr; gap:1vw; min-height:0}
.sec{background:var(--card); border-radius:var(--raio); box-shadow:var(--sombra); padding:1.2vh 1vw; display:flex; flex-direction:column; min-height:0}
.sec > .eyebrow{font-size:.8vw; font-weight:700; color:var(--ink3); text-transform:uppercase; letter-spacing:.14em; margin-bottom:.8vh; flex-shrink:0}

/* Canais */
.canais{display:grid; grid-template-columns:repeat(3,1fr); gap:1vw; flex:1; min-height:0}
.canal{background:var(--bg); border-radius:.8vw; padding:0 1vw; display:flex; align-items:center; gap:1vw}
.canal .mring{width:5.2vw; height:5.2vw; flex-shrink:0}
.canal .txt{display:flex; flex-direction:column; min-width:0}
.canal .nome{font-size:1.15vw; font-weight:700; letter-spacing:-.01em}
.canal .mtd{font-size:1.4vw; font-weight:500; letter-spacing:-.02em; margin-top:.1vh}
.canal .sub{font-size:.8vw; color:var(--ink2); margin-top:.2vh}

/* Categorias */
.cats{display:grid; grid-template-columns:repeat(5,1fr); gap:.8vw; flex:1; min-height:0}
.cat{background:var(--bg); border-radius:.8vw; padding:.8vh .6vw; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:.4vh}
.cat .mring{width:3.8vw; height:3.8vw}
.cat .nome{font-size:.9vw; font-weight:600; text-align:center; line-height:1}
.cat .mtd{font-size:.95vw; color:var(--ink2); font-weight:500}

/* Mini-ring center label */
.mring{position:relative}
.mring svg{width:100%; height:100%; transform:rotate(-90deg)}
.mring .ml{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:1.05vw; font-weight:600; letter-spacing:-.02em}
.cat .mring .ml{font-size:.85vw}

/* Regionais: mapa + lista */
.reg-body{flex:1; display:grid; grid-template-columns:1.05fr 1fr; gap:1vw; min-height:0}
.mapa{position:relative; min-height:0; display:flex; align-items:center; justify-content:center}
.mapa svg{height:100%; width:100%}
.reg-lista{display:flex; flex-direction:column; justify-content:space-between; min-height:0; padding:.3vh 0}
.reg-row{display:grid; grid-template-columns:3.4vw 1fr auto; align-items:center; gap:.7vw}
.reg-row .cod{font-size:1vw; font-weight:700; letter-spacing:-.01em}
.reg-bar{height:.85vw; border-radius:.5vw; background:var(--track); position:relative; overflow:hidden}
.reg-bar i{position:absolute; inset:0 auto 0 0; border-radius:.5vw}
.reg-row .p{font-size:1.05vw; font-weight:600; letter-spacing:-.02em; min-width:3.4vw; text-align:right; display:flex; align-items:center; gap:.4vw; justify-content:flex-end}

/* ===== Dia a dia ===== */
.daily{grid-row:2; grid-column:1 / -1; background:var(--card); border-radius:var(--raio); box-shadow:var(--sombra);
  padding:1vh 1.2vw .6vh; display:flex; flex-direction:column; min-height:0}
.daily .eyebrow{font-size:.8vw; font-weight:700; color:var(--ink3); text-transform:uppercase; letter-spacing:.14em; flex-shrink:0}
.barras{flex:1; display:flex; align-items:flex-end; gap:.3vw; position:relative; padding-top:1.4vh; min-height:0}
.linha-meta{position:absolute; left:0; right:0; border-top:.13vw dashed var(--roxo); opacity:.5}
.linha-meta i{position:absolute; right:0; top:-1.7vh; font-style:normal; font-size:.72vw; color:var(--roxo); font-weight:600}
.dia{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%; gap:.3vh}
.dia .barra{width:80%; border-radius:.25vw .25vw 0 0; background:var(--roxo); min-height:.15vh}
.dia.fds .barra{background:#cdb6ea}
.dia.fut .barra{background:var(--track); min-height:.15vh}
.dia .rot{font-size:.62vw; color:var(--ink3); font-variant-numeric:tabular-nums}

/* ===== Footer ===== */
footer{height:4.5vh; display:flex; align-items:center; justify-content:space-between; padding:0 1.8vw; flex-shrink:0}
.pontos{display:flex; gap:.5vw}
.pt{width:.5vw; height:.5vw; border-radius:50%; background:var(--track); transition:all .35s}
.pt.on{background:var(--roxo); width:1.9vw; border-radius:.4vw}
.fonte{font-size:.8vw; color:var(--ink3)}
#prog{position:absolute; bottom:0; left:0; height:.35vh; background:var(--roxo); width:0; z-index:5}
#prog.run{transition:width 20s linear; width:100%}

/* ===== Overlay ===== */
#overlay{position:fixed; inset:0; background:var(--bg); z-index:50; display:flex; align-items:center; justify-content:center}
#overlay.hide{display:none}
#overlay .box{background:var(--card); border-radius:var(--raio); box-shadow:var(--sombra); padding:3vw; text-align:center; cursor:default; max-width:46vw}
#overlay h2{font-size:1.5vw; font-weight:700; margin-bottom:1vh}
#overlay p{font-size:1vw; color:var(--ink2); margin-bottom:1.6vh; line-height:1.5}
#overlay input{font-size:1vw}
@media (prefers-reduced-motion:reduce){.tela{transition:none} #prog.run{transition:none}}
</style>
</head>
<body>

<div id="overlay"><div class="box">
  <h2>Painel de Vendas</h2>
  <p id="ovmsg">Carregando dados…</p>
  <input type="file" id="arq" accept=".xlsx" style="display:none">
</div></div>

<header>
  <div class="tit"><span class="ind" id="h-ind"></span><span class="ponto"></span><span class="mes" id="h-mes"></span></div>
  <div class="dir">
    <span class="dias" id="h-dias"></span>
    <span class="relogio" id="h-rel"></span>
  </div>
</header>

<div id="palco"></div>
<div id="prog"></div>

<footer>
  <div class="pontos" id="pontos"></div>
  <span class="fonte" id="fonte"></span>
</footer>

/* ============ HELPERS ============ */
function paraData(v){
  if(v instanceof Date) return new Date(v.getFullYear(),v.getMonth(),v.getDate());
  if(typeof v==='number'){const d=new Date(Date.UTC(1899,11,30)+Math.round(v)*864e5);return new Date(d.getUTCFullYear(),d.getUTCMonth(),d.getUTCDate());}
  if(typeof v==='string'){const p=v.split('/');if(p.length===3)return new Date(+p[2],+p[1]-1,+p[0]);}
  return null;
}
const k3=(i,d,c)=>i+'|'+d+'|'+c;
function fBRL(v){if(v==null||isNaN(v))return'—';const a=Math.abs(v);
  if(a>=1e6)return'R$ '+(v/1e6).toLocaleString('pt-BR',{minimumFractionDigits:1,maximumFractionDigits:1})+'M';
  if(a>=1e3)return'R$ '+(v/1e3).toLocaleString('pt-BR',{maximumFractionDigits:0})+'k';
  return'R$ '+v.toLocaleString('pt-BR',{maximumFractionDigits:0});}
function fUn(v){if(v==null||isNaN(v))return'—';const a=Math.abs(v);
  if(a>=1e6)return(v/1e6).toLocaleString('pt-BR',{maximumFractionDigits:2})+'M';
  if(a>=1e3)return(v/1e3).toLocaleString('pt-BR',{maximumFractionDigits:1})+'k';
  return Math.round(v).toLocaleString('pt-BR');}
const fVal=(ind,v)=>ind==='FATURAMENTO'?fBRL(v):fUn(v);
const fPct=p=>(p==null||isNaN(p))?'—':p.toLocaleString('pt-BR',{maximumFractionDigits:0});
function farol(p){if(p==null||isNaN(p))return'neutro';if(p>=100)return'ok';if(p>=90)return'quase';return'ruim';}
const COR={ok:'#34c759',quase:'#ff9f0a',ruim:'#ff3b30',neutro:'#aeaeb2'};

/* anel SVG: pct preenche o arco, classe define a cor */
function ring(pct,cls,r,sw){
  const C=2*Math.PI*r, off=C*(1-Math.min(Math.max(pct||0,0),100)/100), cx=50, cy=50;
  return `<svg viewBox="0 0 100 100">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--track)" stroke-width="${sw}"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${COR[cls]}" stroke-width="${sw}"
      stroke-linecap="round" stroke-dasharray="${C}" stroke-dashoffset="${off}"/>
  </svg>`;
}

/* ============ CARGA ============ */
function b64ToBuf(b64){const bin=atob(b64);const a=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)a[i]=bin.charCodeAt(i);return a.buffer;}
async function carregar(){
  try{
    const r=await fetch(ARQUIVO+'?t='+Date.now(),{cache:'no-store'});
    if(!r.ok)throw 0;
    processar(await r.arrayBuffer());
  }catch(e){
    if(typeof EMBEDDED_XLSX_B64!=='undefined' && EMBEDDED_XLSX_B64){
      try{ processar(b64ToBuf(EMBEDDED_XLSX_B64)); return; }catch(_){}
    }
    $('#ovmsg').textContent='Não consegui ler "'+ARQUIVO+'" automaticamente. Selecione o arquivo abaixo para testar (no servidor isso é automático).';
    const inp=$('#arq'); inp.style.display='inline-block';
    inp.onchange=ev=>{const f=ev.target.files[0];if(!f)return;const fr=new FileReader();fr.onload=()=>processar(fr.result);fr.readAsArrayBuffer(f);};
  }
}
function processar(buf){
  const wb=XLSX.read(buf,{type:'array',cellDates:true});
  const aba=n=>XLSX.utils.sheet_to_json(wb.Sheets[n],{defval:null});
  const cfg=aba('CONFIG').map(r=>({data:paraData(r['Data']),util:+r[Object.keys(r)[1]]===1})).filter(r=>r.data);
  const base=aba('BASE_DIARIA').map(r=>({data:paraData(r['Data']),ind:String(r['Indicador']).trim().toUpperCase(),
    dim:String(r['Dimensão']||r['Dimensao']).trim().toUpperCase(),corte:String(r['Corte']).trim(),real:+r['Realizado']||0})).filter(r=>r.data);
  const metas={},cen={};
  aba('METAS').forEach(r=>{metas[k3(String(r['Indicador']).trim().toUpperCase(),String(r['Dimensão']||r['Dimensao']).trim().toUpperCase(),String(r['Corte']).trim())]=+r['Meta Mês']||+r['Meta Mes']||null;});
  aba('CENARIO').forEach(r=>{cen[k3(String(r['Indicador']).trim().toUpperCase(),String(r['Dimensão']||r['Dimensao']).trim().toUpperCase(),String(r['Corte']).trim())]=+r['Projetado Mês']||+r['Projetado Mes']||null;});

  const ultima=base.reduce((m,r)=>r.data>m?r.data:m,base[0].data);
  const utiTot=cfg.filter(c=>c.util).length;
  const utiDec=cfg.filter(c=>c.util&&c.data<=ultima).length;
  const utiRest=Math.max(utiTot-utiDec,0);
  const mtd={},porDia={};
  base.forEach(r=>{const k=k3(r.ind,r.dim,r.corte);mtd[k]=(mtd[k]||0)+r.real;
    if(r.dim==='TOTAL'){const dk=r.ind+'|'+r.data.getDate();porDia[dk]=(porDia[dk]||0)+r.real;}});

  function calc(ind,dim,corte){
    const k=k3(ind,dim,corte), m=mtd[k]??null, meta=metas[k]??null, proj=cen[k]??null;
    const metaProp=(meta!=null&&utiTot>0)?meta*utiDec/utiTot:null;
    return {mtd:m, meta, proj,
      prog:(m!=null&&meta)?m/meta*100:null,
      ritmo:(m!=null&&metaProp)?m/metaProp*100:null,
      projPct:(proj!=null&&meta)?proj/meta*100:null,
      pdu:(m!=null&&utiDec>0)?m/utiDec:null,
      mtg:(m!=null&&meta!=null&&utiRest>0)?(meta-m)/utiRest:null};
  }
  D={calc,cfg,porDia,ultima,utiTot,utiDec,utiRest,mes:ultima.getMonth(),ano:ultima.getFullYear()};
  $('#h-mes').textContent=MESES[D.mes]+' '+D.ano;
  $('#h-dias').innerHTML='<b>'+utiDec+'</b>/'+utiTot+' dias úteis';
  $('#fonte').textContent='Dados até '+ultima.toLocaleDateString('pt-BR')+' · atualizado '+new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  montar();
  $('#overlay').classList.add('hide');
  girar();
}

/* ============ RENDER ============ */
function heroHTML(ind){
  const c=D.calc(ind,'TOTAL','Total'), fr=farol(c.ritmo), frP=farol(c.projPct);
  const mtg=c.mtg==null?'—':(c.mtg<=0?'<span class="ok">batida ✓</span>':fVal(ind,c.mtg));
  return `<div class="hero">
    <div class="eyebrow">Total · ${ind==='FATURAMENTO'?'Faturamento':'Volume'}</div>
    <div class="ring-wrap"><div class="ring">${ring(c.prog,fr,42,8)}
      <div class="ring-center"><div class="big tabular ${fr}">${fPct(c.prog)}<small>%</small></div>
      <div class="cap">da meta · ritmo ${fPct(c.ritmo)}%</div></div></div></div>
    <div class="hero-mtd"><div class="v tabular">${fVal(ind,c.mtd)}</div><div class="k">Realizado MTD</div></div>
    <div class="hero-grid">
      <div class="mini-met"><div class="k">PDU · dia</div><div class="v tabular">${fVal(ind,c.pdu)}</div></div>
      <div class="mini-met"><div class="k">MTG · falta/dia</div><div class="v tabular">${mtg}</div></div>
    </div>
    <div class="proj-banner"><div class="l"><div class="k">Projetado do mês</div><div class="v tabular">${fVal(ind,c.proj)}</div></div>
      <div class="pct tabular ${frP}"><span class="farol-dot bg-${frP}"></span>${fPct(c.projPct)}%</div></div>
  </div>`;
}
function canaisHTML(ind){
  let h='<div class="sec" style="grid-row:1"><div class="eyebrow">Canais</div><div class="canais">';
  for(const cn of CANAIS){const c=D.calc(ind,'CANAL',cn),fr=farol(c.ritmo);
    h+=`<div class="canal"><div class="mring">${ring(c.prog,fr,40,11)}<div class="ml ${fr}">${fPct(c.prog)}%</div></div>
      <div class="txt"><div class="nome">${cn}</div><div class="mtd tabular">${fVal(ind,c.mtd)}</div>
      <div class="sub">proj <b class="${farol(c.projPct)}">${fPct(c.projPct)}%</b></div></div></div>`;}
  return h+'</div></div>';
}
function catsHTML(ind){
  let h='<div class="sec" style="grid-row:2"><div class="eyebrow">Categorias</div><div class="cats">';
  for(const ct of CATS){const c=D.calc(ind,'CATEGORIA',ct),fr=farol(c.ritmo);
    h+=`<div class="cat"><div class="mring">${ring(c.prog,fr,40,11)}<div class="ml ${fr}">${fPct(c.prog)}%</div></div>
      <div class="nome">${ct}</div><div class="mtd tabular">${fVal(ind,c.mtd)}</div></div>`;}
  return h+'</div></div>';
}
function mapaSVG(ind){
  let dots='';
  for(const rg of REGS){const c=D.calc(ind,'REGIONAL',rg),fr=farol(c.ritmo),[x,y]=REG_POS[rg];
    dots+=`<g><circle cx="${x}" cy="${y}" r="26" fill="${COR[fr]}" stroke="#fff" stroke-width="4"/>
      <text x="${x}" y="${y+8}" text-anchor="middle" font-size="21" font-weight="700" fill="#fff"
        font-family="-apple-system,Arial">${rg}</text></g>`;}
  return `<svg viewBox="0 0 612 660" preserveAspectRatio="xMidYMid meet">
    <path d="${BR_PATH}" fill="#e2e2e7" stroke="#d2d2d7" stroke-width="2"/>${dots}</svg>`;
}
function regsHTML(ind){
  let lista='';
  for(const rg of REGS){const c=D.calc(ind,'REGIONAL',rg),fr=farol(c.ritmo);
    lista+=`<div class="reg-row"><span class="cod">${rg}</span>
      <div class="reg-bar"><i class="bg-${fr}" style="width:${Math.min(c.prog||0,100)}%"></i></div>
      <span class="p tabular ${fr}">${fPct(c.prog)}%</span></div>`;}
  return `<div class="sec" style="grid-row:3"><div class="eyebrow">Regionais · ritmo vs meta</div>
    <div class="reg-body"><div class="mapa">${mapaSVG(ind)}</div><div class="reg-lista">${lista}</div></div></div>`;
}
function dailyHTML(ind){
  const c=D.calc(ind,'TOTAL','Total');
  const metaDia=(c.meta!=null&&D.utiTot>0)?c.meta/D.utiTot:null;
  const vals=D.cfg.map(x=>D.porDia[ind+'|'+x.data.getDate()]??null);
  const max=Math.max(...vals.filter(v=>v!=null),metaDia||0)*1.12||1;
  let b=''; if(metaDia!=null)b+=`<div class="linha-meta" style="bottom:${metaDia/max*100}%"><i>meta/dia ${fVal(ind,metaDia)}</i></div>`;
  D.cfg.forEach((x,i)=>{const v=vals[i],fds=!x.util,fut=v==null,hh=fut?2:Math.max(v/max*100,1);
    b+=`<div class="dia ${fds?'fds':''} ${fut?'fut':''}"><div class="barra" style="height:${hh}%"></div><div class="rot">${x.data.getDate()}</div></div>`;});
  return `<div class="daily"><div class="eyebrow">Resultado por dia · ${ind==='FATURAMENTO'?'Faturamento':'Volume'}</div><div class="barras">${b}</div></div>`;
}
function telaHTML(ind,i){
  return `<div class="tela ${i===atual?'ativa':''}" data-i="${i}">
    ${heroHTML(ind)}<div class="right">${canaisHTML(ind)}${catsHTML(ind)}${regsHTML(ind)}</div>${dailyHTML(ind)}</div>`;
}
function montar(){
  $('#palco').innerHTML=INDS.map((x,i)=>telaHTML(x.id,i)).join('');
  $('#pontos').innerHTML=INDS.map((_,i)=>`<div class="pt ${i===atual?'on':''}"></div>`).join('');
  setHeader();
}
function setHeader(){$('#h-ind').textContent=INDS[atual].rot;}

/* ============ CARROSSEL ============ */
function mostrar(i){
  atual=(i+INDS.length)%INDS.length;
  document.querySelectorAll('.tela').forEach(t=>t.classList.toggle('ativa',+t.dataset.i===atual));
  document.querySelectorAll('.pt').forEach((p,j)=>p.classList.toggle('on',j===atual));
  setHeader();
  const p=$('#prog'); p.classList.remove('run'); void p.offsetWidth; p.classList.add('run');
}
function girar(){if(timer)clearInterval(timer); mostrar(atual); timer=setInterval(()=>mostrar(atual+1),SEG_TELA*1000);}
window.__setD=(obj)=>{D=obj; montar(); $('#overlay').classList.add('hide'); mostrar(0);};
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'){mostrar(atual+1);girar();}if(e.key==='ArrowLeft'){mostrar(atual-1);girar();}});

/* ============ RELÓGIO + RELOAD ============ */
setInterval(()=>{const a=new Date();
  $('#h-rel').innerHTML=a.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'})+' · <b>'+a.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})+'</b>';},1000);
setInterval(carregar,MIN_RELOAD*60*1000);
carregar();
</script>
</body>
</html>
